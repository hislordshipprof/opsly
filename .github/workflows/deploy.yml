name: Deploy OPSLY

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: us-central1
  CLOUD_RUN_SERVICE: opsly-backend
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  # ── Step 1: Validate both apps build cleanly ──────────────
  validate:
    name: Validate Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            opsly/backend/package-lock.json
            opsly/frontend/package-lock.json

      - name: Install backend dependencies
        run: npm ci
        working-directory: opsly/backend

      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: opsly/backend

      - name: Type-check backend
        run: npx tsc --noEmit
        working-directory: opsly/backend

      - name: Install frontend dependencies
        run: npm ci
        working-directory: opsly/frontend

      - name: Type-check & build frontend
        run: npm run build
        working-directory: opsly/frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_WS_URL: ${{ secrets.VITE_WS_URL }}

  # ── Step 2: Deploy backend to Google Cloud Run ────────────
  deploy-backend:
    name: Deploy Backend (Cloud Run)
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker $GCP_REGION-docker.pkg.dev --quiet

      - name: Create Artifact Registry repo (if not exists)
        run: |
          gcloud artifacts repositories describe opsly \
            --location=$GCP_REGION --format="value(name)" 2>/dev/null || \
          gcloud artifacts repositories create opsly \
            --repository-format=docker \
            --location=$GCP_REGION \
            --description="OPSLY Docker images"

      - name: Build Docker image
        run: |
          docker build \
            -t $GCP_REGION-docker.pkg.dev/$GCP_PROJECT_ID/opsly/$CLOUD_RUN_SERVICE:${{ github.sha }} \
            -t $GCP_REGION-docker.pkg.dev/$GCP_PROJECT_ID/opsly/$CLOUD_RUN_SERVICE:latest \
            .
        working-directory: opsly/backend

      - name: Push Docker image
        run: |
          docker push $GCP_REGION-docker.pkg.dev/$GCP_PROJECT_ID/opsly/$CLOUD_RUN_SERVICE:${{ github.sha }}
          docker push $GCP_REGION-docker.pkg.dev/$GCP_PROJECT_ID/opsly/$CLOUD_RUN_SERVICE:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy $CLOUD_RUN_SERVICE \
            --image $GCP_REGION-docker.pkg.dev/$GCP_PROJECT_ID/opsly/$CLOUD_RUN_SERVICE:${{ github.sha }} \
            --platform managed \
            --region $GCP_REGION \
            --allow-unauthenticated \
            --quiet

  # ── Step 3: Deploy frontend to Vercel ─────────────────────
  deploy-frontend:
    name: Deploy Frontend (Vercel)
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Deploy to Vercel Production
        run: vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: opsly/frontend
